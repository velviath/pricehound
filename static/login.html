<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — PriceHound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>

<nav>
  <a class="logo" href="/">
    <span class="logo-dot"></span>
    PriceHound
  </a>
</nav>

<main>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Track prices and get notified when they drop.</p>

    <div class="tabs">
      <div class="tab-indicator"></div>
      <button class="tab-btn active" data-tab="login">Sign In</button>
      <button class="tab-btn" data-tab="register">Create Account</button>
    </div>

    <!-- Sign In -->
    <div class="form-panel active" id="panel-login">
      <div class="error-msg" id="login-error"></div>
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="btn-login">Sign In</button>
      <div style="text-align:center; margin-top:14px;">
        <button class="link-btn" id="btn-forgot-link">Forgot password?</button>
      </div>
    </div>

    <!-- Forgot password — enter email -->
    <div class="form-panel" id="panel-forgot">
      <div class="error-msg" id="forgot-error"></div>
      <div class="success-msg" id="forgot-success"></div>
      <p style="font-size:14px;color:var(--slate);margin-bottom:20px;">Enter your email and we'll send you a 6-digit code.</p>
      <div class="field">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <button class="btn-primary" id="btn-send-code">Send Code</button>
      <div style="text-align:center;">
        <button class="back-link" id="btn-back-login">← Back to Sign In</button>
      </div>
    </div>

    <!-- Forgot password — enter code + new password -->
    <div class="form-panel" id="panel-verify">
      <div class="error-msg" id="verify-error"></div>
      <p style="font-size:14px;color:var(--slate);margin-bottom:20px;">Enter the 6-digit code from your email and choose a new password.</p>
      <div class="field">
        <label for="verify-code">Code</label>
        <input type="text" id="verify-code" class="code-input" placeholder="——————" maxlength="6" autocomplete="one-time-code" />
      </div>
      <div class="field">
        <label for="verify-password">New Password</label>
        <input type="password" id="verify-password" placeholder="Min. 8 characters" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="btn-reset-password">Reset Password</button>
      <div style="text-align:center;">
        <button class="back-link" id="btn-back-forgot">← Back</button>
      </div>
    </div>

    <!-- Register -->
    <div class="form-panel" id="panel-register">
      <div class="error-msg" id="register-error"></div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="btn-register">Create Account</button>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script src="/static/js/login.js"></script>
</body>
</html>
