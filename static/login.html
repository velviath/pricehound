<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — PriceHound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --slate-dark:  #2D3748;
      --slate:       #4A5568;
      --slate-light: #EDF2F7;
      --sage:        #5C7A5C;
      --sage-light:  #E8F0E8;
      --rose:        #8B5E6B;
      --rose-light:  #F5E6EC;
      --bg:          #FAFAF8;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--slate-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ──────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 62px;
      background: rgba(250,250,248,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      padding: 0 32px;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--sage);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Page layout ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 40px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--slate);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      background: var(--slate-light);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      position: relative;
    }
    .tab-indicator {
      position: absolute;
      top: 4px; height: calc(100% - 8px);
      background: #fff;
      border-radius: 9px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: left 0.22s cubic-bezier(0.4,0,0.2,1), width 0.22s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none; z-index: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--slate);
      cursor: pointer;
      transition: color 0.2s, transform 0.12s;
      position: relative; z-index: 1;
    }
    .tab-btn.active { color: var(--slate-dark); }
    .tab-btn:active { transform: scale(0.97); }

    /* ── Form ────────────────────────────────────────────── */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--slate);
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--slate-light);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      color: var(--slate-dark);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--sage);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--slate-dark);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: var(--rose-light);
      color: var(--rose);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
    }
    .toast {
      background: var(--slate-dark);
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: var(--sage); }
    .toast.error   { background: var(--rose); }
    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">
    <span class="logo-dot"></span>
    PriceHound
  </a>
</nav>

<main>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Track prices and get notified when they drop.</p>

    <div class="tabs">
      <div class="tab-indicator"></div>
      <button class="tab-btn active" data-tab="login">Sign In</button>
      <button class="tab-btn" data-tab="register">Create Account</button>
    </div>

    <!-- Sign In -->
    <div class="form-panel active" id="panel-login">
      <div class="error-msg" id="login-error"></div>
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="btn-login">Sign In</button>
    </div>

    <!-- Register -->
    <div class="form-panel" id="panel-register">
      <div class="error-msg" id="register-error"></div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="btn-register">Create Account</button>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script>
  // ── Redirect if already logged in ────────────────────────────────────────
  if (localStorage.getItem('ph_token')) {
    window.location.href = '/dashboard';
  }

  // ── Activate tab from URL param (?tab=register or ?tab=login) ────────────
  const tabParam = new URLSearchParams(location.search).get('tab');
  if (tabParam === 'register') {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-tab="register"]').classList.add('active');
    document.getElementById('panel-register').classList.add('active');
  }

  // ── Tab sliding indicator ─────────────────────────────────────────────────
  function moveTabIndicator(btn) {
    const ind = document.querySelector('.tab-indicator');
    if (!ind) return;
    ind.style.left  = btn.offsetLeft + 'px';
    ind.style.width = btn.offsetWidth + 'px';
  }

  // Init without animation
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) {
    const ind = document.querySelector('.tab-indicator');
    ind.style.transition = 'none';
    moveTabIndicator(activeTab);
    requestAnimationFrame(() => { ind.style.transition = ''; });
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      moveTabIndicator(btn);
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── Toast helper ──────────────────────────────────────────────────────────
  function showToast(msg, type = '') {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError(id) {
    const el = document.getElementById(id);
    el.style.display = 'none';
    el.textContent = '';
  }

  // ── Login ─────────────────────────────────────────────────────────────────
  document.getElementById('btn-login').addEventListener('click', async () => {
    clearError('login-error');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('login-error', 'Please fill in all fields.'); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showError('login-error', data.detail || 'Login failed.'); return; }
      localStorage.setItem('ph_token', data.access_token);
      showToast('Signed in!', 'success');
      setTimeout(() => { window.location.href = '/dashboard'; }, 600);
    } catch {
      showError('login-error', 'Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // ── Register ──────────────────────────────────────────────────────────────
  document.getElementById('btn-register').addEventListener('click', async () => {
    clearError('register-error');
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!email || !password) { showError('register-error', 'Please fill in all fields.'); return; }
    if (password.length < 8) { showError('register-error', 'Password must be at least 8 characters.'); return; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showError('register-error', data.detail || 'Registration failed.'); return; }
      localStorage.setItem('ph_token', data.access_token);
      showToast('Account created!', 'success');
      setTimeout(() => { window.location.href = '/dashboard'; }, 600);
    } catch {
      showError('register-error', 'Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });

  // Allow submitting with Enter key
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.form-panel.active');
    if (!active) return;
    active.querySelector('.btn-primary').click();
  });
</script>
</body>
</html>
